name: Fetch Stock Data

# When this workflow runs:
#   - Every weekday at 5pm Eastern Time (after market close, 22:00 UTC)
#   - Every weekday at 11am Eastern Time (midday update, 16:00 UTC)
#   - Manually via "Run workflow" button in the Actions tab
on:
  schedule:
    - cron: '0 16 * * 1-5'   # 11am ET weekdays
    - cron: '0 22 * * 1-5'   # 5pm ET weekdays
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: |
          python -m pip install --upgrade pip
          pip install 'yfinance>=0.2.50,<0.3'

      - name: Run fetcher
        run: python fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master.csv data/master.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update market data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
