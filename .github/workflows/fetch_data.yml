name: Fetch Stock Data

# Schedule:
#   - 11am ET weekdays (15:00 UTC) — quote refresh only
#   - 5pm ET weekdays  (21:00 UTC) — quote + 5-year history refresh
#   - Manual via "Run workflow" button
on:
  schedule:
    - cron: '0 15 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      refresh_history:
        description: 'Also refresh price history'
        type: boolean
        default: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: |
          python -m pip install --upgrade pip
          pip install 'yfinance>=0.2.50,<0.3'

      - name: Fetch quotes + fundamentals
        run: python fetch_data.py

      # Always run history on manual dispatch (when refresh_history=true) and
      # on the 5pm ET cron. Skip on the 11am cron to save time.
      - name: Fetch 5-year price history
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.refresh_history) ||
          github.event.schedule == '0 21 * * 1-5'
        run: python fetch_history.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage every file under data/ so per-ticker history JSONs + the manifest
          # both get committed alongside master.csv/json and prices.csv/json.
          git add -A data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update market data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
